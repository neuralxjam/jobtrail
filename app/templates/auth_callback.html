<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signing you in — JobTrail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 flex items-center justify-center min-h-screen">
    <p class="text-slate-400">Signing you in…</p>
    <script>
        const params = new URLSearchParams(window.location.hash.slice(1));
        const token = params.get('access_token');
        if (token) {
            fetch('/auth/set-token', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token: token})
            }).then(r => {
                window.location.href = r.ok ? '/' : '/login';
            }).catch(() => { window.location.href = '/login'; });
        } else {
            window.location.href = '/login';
        }
    </script>
</body>
</html>
