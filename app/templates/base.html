<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JobTrail{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: '#6366f1' } } }
        }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-full">

    <!-- Navbar -->
    <nav class="border-b border-slate-800 bg-slate-900">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <span class="text-xl font-bold text-indigo-400">JobTrail</span>
            <span class="text-sm text-slate-400">Track every application.</span>
        </div>
    </nav>

    <!-- Main content -->
    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
