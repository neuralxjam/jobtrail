<tr id="app-row-{{ app.id }}" class="border-b border-slate-800/60 bg-slate-800/30">
    <td colspan="6" class="px-4 py-4">
        <form
            hx-put="/applications/{{ app.id }}"
            hx-target="#app-row-{{ app.id }}"
            hx-swap="outerHTML"
            class="grid grid-cols-6 gap-3 items-end">

            <input name="company" value="{{ app.company }}" required
                   placeholder="Company"
                   class="col-span-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:border-indigo-500 transition">

            <input name="role" value="{{ app.role }}" required
                   placeholder="Role"
                   class="col-span-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:border-indigo-500 transition">

            <select name="status"
                    class="col-span-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm
                           focus:outline-none focus:border-indigo-500 transition">
                {% for s in ['applied', 'interviewing', 'offered', 'rejected', 'ghosted'] %}
                    <option value="{{ s }}" {{ 'selected' if app.status.value == s else '' }}>
                        {{ s }}
                    </option>
                {% endfor %}
            </select>

            <input type="date" name="date_applied" value="{{ app.date_applied }}" required
                   class="col-span-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:border-indigo-500 transition">

            <input name="job_url" value="{{ app.job_url or '' }}" placeholder="Job URL (optional)"
                   class="col-span-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:border-indigo-500 transition">

            <div class="col-span-1 flex gap-2 justify-end">
                <button type="submit"
                        class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-medium
                               px-3 py-2 rounded-lg transition">
                    Save
                </button>
                <button type="button"
                        hx-get="/applications/{{ app.id }}/row"
                        hx-target="#app-row-{{ app.id }}"
                        hx-swap="outerHTML"
                        class="text-slate-400 hover:text-white text-xs px-3 py-2 transition">
                    Cancel
                </button>
            </div>

        </form>
    </td>
</tr>
