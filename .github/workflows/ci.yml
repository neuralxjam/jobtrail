name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Run tests
        run: pytest --tb=short -q
        env:
          # database.py reads DATABASE_URL at import time. Tests use an
          # in-memory SQLite override (conftest.py), so this URL is never
          # actually connected to — it just has to exist so the import succeeds.
          DATABASE_URL: sqlite:///./test.db
